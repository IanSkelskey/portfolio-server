services:
  - type: web
    name: portfolio-server
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: RESEND_API_KEY
        sync: false   # set manually in Render dashboard
      - key: CONTACT_TO_EMAIL
        sync: false
      - key: EXTRA_ORIGINS
        sync: false   # e.g. http://localhost:5173 for local dev testing
